<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — Game Shop</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body{background:#071028;color:#fff;min-height:100vh}
    .card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.04)}
    a{color:#93c5fd}
    h4,p,.muted,.nav-link,.navbar-brand,.card-body{color:#fff!important}
    .muted{color:rgba(255,255,255,0.8)!important}
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="newHome.html">Game Shop</a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="newHome.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="gamesSearch.html">Games</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        <div class="card p-4 shadow-sm text-center">
          <h4 class="mb-3">Sign in with Cognito</h4>
          <p class="muted">Authentication is handled by AWS Cognito Hosted UI. No local password form is used.</p>
          <div class="d-grid gap-2">
            <button id="Login" class="btn btn-primary" type="button">Continue to Cognito</button>
            <a class="btn btn-outline-light" href="newHome.html">Back home</a>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import { signIn } from "./js/cognito-auth.js";
    document.getElementById("Login").addEventListener("click", () => signIn());
    signIn();
  </script>
</body>
</html>
