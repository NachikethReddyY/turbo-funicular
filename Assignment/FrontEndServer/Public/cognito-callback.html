<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Signing in - Game Shop</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #071028; color: #fff; min-height: 100vh; display: grid; place-items: center; }
    .card { max-width: 520px; background: #0b1220; border: 1px solid rgba(255,255,255,.08); }
  </style>
</head>
<body>
  <main class="card p-4 text-center">
    <h1 class="h4">Completing sign in</h1>
    <p id="status" class="mb-0 text-white-50">Exchanging Cognito authorization code for tokens.</p>
  </main>

  <script type="module">
    import { completeSignIn } from "./js/cognito-auth.js";

    const status = document.getElementById("status");

    completeSignIn()
      .then(() => {
        status.textContent = "Signed in. Redirecting...";
        window.location.replace("newHome.html");
      })
      .catch((err) => {
        console.error(err);
        status.textContent = "Sign-in failed. Check the Cognito callback URL, domain, and app client settings.";
      });
  </script>
</body>
</html>
