<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Complete your profile - Game Shop</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #071028; color: #fff; min-height: 100vh; }
    .card { background: #0b1220; border: 1px solid rgba(255,255,255,.08); color: #fff; }
    .form-control, .form-control:focus { background: rgba(255,255,255,.04); color: #fff; border-color: rgba(255,255,255,.12); }
    .form-text { color: rgba(255,255,255,.65) !important; }
    .avatar-preview { width: 96px; height: 96px; border-radius: 50%; object-fit: cover; border: 2px solid rgba(255,255,255,.15); }
  </style>
</head>
<body>
  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-7 col-lg-6">
        <div class="card p-4 shadow-sm">
          <h1 class="h4 mb-2">Choose your display name</h1>
          <p class="form-text mb-4">Cognito sign-in succeeded. Pick a username for reviews and comments. You can add a photo or keep the default monogram.</p>

          <form id="profileForm" class="vstack gap-3">
            <div class="text-center">
              <img id="avatarPreview" class="avatar-preview mb-2" alt="Profile preview">
              <div>
                <label class="btn btn-outline-light btn-sm mb-0" for="profileImage">Upload photo (JPEG)</label>
                <input id="profileImage" class="d-none" type="file" accept="image/jpeg">
                <button id="clearImage" class="btn btn-link btn-sm text-white-50" type="button">Use monogram</button>
              </div>
            </div>

            <div>
              <label for="username" class="form-label">Username</label>
              <input id="username" class="form-control" name="username" minlength="3" maxlength="30"
                pattern="[A-Za-z0-9_]{3,30}" required placeholder="e.g. gamefan42">
              <div class="form-text">3-30 characters. Letters, numbers, and underscores only.</div>
            </div>

            <div class="d-grid gap-2">
              <button class="btn btn-primary" type="submit">Save and continue</button>
            </div>
            <p id="status" class="form-text mb-0 text-center"></p>
          </form>
        </div>
      </div>
    </div>
  </main>

  <script type="module">
    import { getAccessToken, getCurrentUser, syncStoredUserProfile } from "./js/cognito-auth.js";
    import { buildMonogramDataUrl, displayUsername } from "./js/profile-utils.js";

    const apiBase = "http://54.210.15.31:8081";
    const status = document.getElementById("status");
    const usernameInput = document.getElementById("username");
    const avatarPreview = document.getElementById("avatarPreview");
    const profileImage = document.getElementById("profileImage");
    const clearImage = document.getElementById("clearImage");
    let selectedImageBase64 = "";

    const token = getAccessToken();
    const currentUser = getCurrentUser();

    if (!token || !currentUser) {
      window.location.replace("login.html");
    }

    async function loadProfile() {
      try {
        const response = await fetch(`${apiBase}/users/me/profile`, {
          headers: {
            Authorization: `Bearer ${token}`,
            "X-Profile-Email": currentUser.email || ""
          }
        });

        if (response.ok) {
          const profile = await response.json();
          if (profile.profileComplete) {
            window.location.replace("newHome.html");
          }
        }
      } catch (error) {
        console.error(error);
      }
    }

    loadProfile();

    function resizeJpegToBase64(file, maxSize = 512, quality = 0.82) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onerror = reject;
        reader.onload = () => {
          const image = new Image();
          image.onerror = reject;
          image.onload = () => {
            const scale = Math.min(1, maxSize / Math.max(image.width, image.height));
            const canvas = document.createElement("canvas");
            canvas.width = Math.max(1, Math.round(image.width * scale));
            canvas.height = Math.max(1, Math.round(image.height * scale));
            const ctx = canvas.getContext("2d");
            ctx.drawImage(image, 0, 0, canvas.width, canvas.height);
            resolve(canvas.toDataURL("image/jpeg", quality).split(",")[1] || "");
          };
          image.src = reader.result;
        };
        reader.readAsDataURL(file);
      });
    }

    function updatePreview(name) {
      const label = name || displayUsername(currentUser.username, currentUser.email);
      avatarPreview.src = selectedImageBase64
        ? `data:image/jpeg;base64,${selectedImageBase64}`
        : buildMonogramDataUrl(label, 96);
    }

    usernameInput.value = displayUsername(currentUser.username, currentUser.email);
    updatePreview(usernameInput.value);

    usernameInput.addEventListener("input", () => updatePreview(usernameInput.value));
    clearImage.addEventListener("click", () => {
      selectedImageBase64 = "";
      profileImage.value = "";
      updatePreview(usernameInput.value);
    });

    profileImage.addEventListener("change", async () => {
      const file = profileImage.files && profileImage.files[0];
      if (!file) {
        return;
      }

      if (file.type !== "image/jpeg") {
        status.textContent = "Please upload a JPEG image.";
        profileImage.value = "";
        return;
      }

      if (file.size > 5 * 1024 * 1024) {
        status.textContent = "Image is too large. Please upload a JPEG under 5 MB.";
        profileImage.value = "";
        return;
      }

      selectedImageBase64 = await resizeJpegToBase64(file, 512, 0.82);
      status.textContent = "";
      updatePreview(usernameInput.value);
    });

    document.getElementById("profileForm").addEventListener("submit", async (event) => {
      event.preventDefault();
      status.textContent = "Saving profile...";

      try {
        const response = await fetch(`${apiBase}/users/me/profile`, {
          method: "PUT",
          headers: {
            Authorization: `Bearer ${token}`,
            "Content-Type": "application/json",
            "X-Profile-Email": currentUser.email || ""
          },
          body: JSON.stringify({
            username: usernameInput.value.trim(),
            profile_pic_url: selectedImageBase64
          })
        });

        const data = await response.json().catch(() => ({}));

        if (!response.ok) {
          status.textContent = data.Message || "Could not save profile.";
          return;
        }

        syncStoredUserProfile(data);
        window.location.replace("newHome.html");
      } catch (error) {
        console.error(error);
        status.textContent = "Network error while saving profile.";
      }
    });
  </script>
</body>
</html>
