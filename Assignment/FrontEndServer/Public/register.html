<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Register - Game Shop</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #1e2f4e; color: #fff; min-height: 100vh; }
    .card { background: #0b1220; border: 1px solid #1f2937; color: #fff; }
    a { color: #93c5fd; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="newHome.html">Game Shop</a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="newHome.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="login.html">Login</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-7 col-lg-6">
        <div class="card p-4 shadow-sm">
          <h1 class="h4 mb-3">Create an account with Cognito</h1>
          <p class="text-white-50">Registration is now handled by the AWS Cognito hosted sign-up page. This removes local password handling from the frontend and backend.</p>
          <div class="d-grid gap-2">
            <button id="signUp" class="btn btn-primary" type="button">Continue to Cognito</button>
            <a class="btn btn-outline-light" href="login.html">Already have an account?</a>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script type="module">
    import { signIn } from "./js/cognito-auth.js";
    document.getElementById("signUp").addEventListener("click", signIn);
  </script>
</body>
</html>
