<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Register - Game Shop</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body{background-color:#1e2f4e;color:#fff;min-height:100vh}
    .card{background-color:#0b1220;border:1px solid #1f2937;color:#fff}
    a{color:#60a5fa}.text-muted{color:rgba(255,255,255,.75)!important}
    .navbar .nav-link,.navbar-brand{color:#fff!important}
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="newHome.html">Game Shop</a>
      <div class="collapse navbar-collapse" id="nav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="newHome.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="login.html">Login</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-7 col-lg-6">
        <div class="card p-4 shadow-sm text-center">
          <h3 class="mb-3">Create an account with Cognito</h3>
          <p class="text-muted small">Local registration has been disabled. Use AWS Cognito Hosted UI for signup/sign-in.</p>
          <div class="d-grid gap-2">
            <button id="Register" class="btn btn-primary" type="button">Continue to Cognito</button>
            <a class="btn btn-outline-light" href="login.html">Already have an account? Login</a>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import { signIn } from "./js/cognito-auth.js";
    document.getElementById("Register").addEventListener("click", () => signIn());
  </script>
</body>
</html>
